aid: react-foundation
name: React Foundation
description: >-
  The React Foundation is a Linux Foundation project announced in February 2026
  that supports React, React Native, and supporting components after Meta
  contributed the React project to the Linux Foundation. It ensures the
  continued open governance, neutral stewardship, and long-term development of
  the React ecosystem used by millions of front-end and mobile developers
  worldwide. The Foundation does not currently expose a public, programmatic
  REST API; engagement with the project happens primarily through GitHub
  repositories and documentation channels.
